<!-- @dsCard group="Components" viewport="700x380" name="Cards, stats, avatars, pills" subtitle="Surfaces, metric tiles, avatars & status chips" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:26px; background:var(--surface-app); font-family:var(--font-sans); }
  .lab { font:var(--fw-bold) 11px/1 var(--font-sans); letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); margin:0 0 12px; }
  .grp { margin-bottom:22px; }
  .row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, StatCard, Avatar, StatusPill, Badge } = window.MedKonectDesignSystem_4460c8;
    function Demo() {
      return (
        <>
          <div className="grp">
            <p className="lab">Stat tiles &amp; cards</p>
            <div className="grid3">
              <StatCard label="Refills Pending" value="14" trend="4% wk" trendDir="down" icon="assignment_turned_in" interactive />
              <StatCard label="Active Scripts" value="142" tone="teal" />
              <Card variant="ink"><div className="mk-eyebrow" style={{color:"var(--mk-teal-200)",marginBottom:8}}>Patient Context</div><div style={{fontSize:13,lineHeight:"19px",color:"var(--mk-blue-100)"}}>BP logged 155/95. Prioritize medication review.</div></Card>
            </div>
          </div>
          <div className="grp">
            <p className="lab">Avatars</p>
            <div className="row">
              <Avatar name="Sarah Montgomery" size="lg" ring status="online" />
              <Avatar name="Michael Chen" size="md" />
              <Avatar name="Elena Rodriguez" size="md" shape="rounded" />
              <Avatar name="David Jameson" size="sm" />
            </div>
          </div>
          <div className="grp">
            <p className="lab">Status pills</p>
            <div className="row">
              <StatusPill variant="info" dot>Active</StatusPill>
              <StatusPill variant="success">Normal</StatusPill>
              <StatusPill variant="danger" dot>Refill Ready</StatusPill>
              <StatusPill variant="neutral">Pending</StatusPill>
              <StatusPill variant="solid">3 Patients</StatusPill>
              <Badge>5</Badge>
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
