<!-- @dsCard group="Portal" viewport="1280x860" name="Clinical Portal" subtitle="Dashboard, Teleconsult, Records, E-Rx, Schedule — interactive" -->
<!-- @startingPoint section="MedKonect" subtitle="Full clinician portal — click-through shell with 5 screens" viewport="1280x860" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedKonect — Clinician Portal</title>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin: 0; }
  /* row hover used in dashboard recent-records */
  .mk-hover-row:hover { background: var(--surface-raised); }
  .mk-daycell:hover { border-color: var(--mk-teal-500) !important; box-shadow: var(--shadow-sm); }
  .mk-pulse-dot { animation: mk-pulse 1.6s var(--ease-standard) infinite; }
  /* responsive */
  @media (max-width: 1080px) {
    .mk-dashgrid, .mk-stat3, .mk-cat4, .mk-tech3, .mk-rx3 { grid-template-columns: 1fr !important; }
    .mk-cat4 { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 880px) {
    .mk-side { display: none !important; }
    .mk-bottom { display: flex !important; }
    .mk-topnav, .mk-topsearch { display: none !important; }
    .mk-main { padding: 16px !important; }
  }
  @media (max-width: 640px) {
    .mk-hide-sm { display: none !important; }
    .mk-selfprev { display: none !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="Teleconsult.jsx"></script>
  <script type="text/babel" src="Records.jsx"></script>
  <script type="text/babel" src="Prescriptions.jsx"></script>
  <script type="text/babel" src="Schedule.jsx"></script>
  <script type="text/babel">
    const { Card } = window.MedKonectDesignSystem_4460c8;
    function Analytics() {
      return (
        <>
          {window.MK_PageHead({ title: "Analytics", subtitle: "Practice insights and reporting." })}
          <Card variant="tactile" style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: 360, gap: 12, textAlign: "center" }}>
            <span className="material-symbols-outlined" style={{ fontSize: 56, color: "var(--mk-teal-500)" }}>monitoring</span>
            <h3 className="mk-headline-md">Analytics module</h3>
            <p className="mk-body-md" style={{ color: "var(--text-muted)", maxWidth: 360 }}>This surface is intentionally left as a placeholder — it was not part of the provided reference screens.</p>
          </Card>
        </>
      );
    }

    function App() {
      const [view, setView] = React.useState("teleconsult");
      const go = (k) => { setView(k); window.scrollTo({ top: 0 }); };
      const screens = {
        dashboard: window.MK_Dashboard,
        teleconsult: window.MK_Teleconsult,
        records: window.MK_Records,
        prescriptions: window.MK_Prescriptions,
        schedule: window.MK_Schedule,
        analytics: Analytics,
      };
      const Screen = screens[view] || window.MK_Dashboard;
      const Shell = window.MK_Shell;
      return (
        <Shell active={view} onNavigate={go}>
          <div key={view} className="mk-page-in"><Screen onNavigate={go} /></div>
        </Shell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
