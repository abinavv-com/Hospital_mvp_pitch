<!-- @dsCard group="Components" viewport="700x320" name="Buttons" subtitle="Variants, sizes, icons, icon buttons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../../styles.css"/>
<style>
  body { margin:0; padding:26px; background:var(--surface-app); font-family:var(--font-sans); }
  .grp { margin-bottom:20px; }
  .lab { font:var(--fw-bold) 11px/1 var(--font-sans); letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); margin:0 0 12px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script>
    /* Load DS bundle via sync XHR — the <script src> tag 404s in the preview
       due to a serve-edge timing issue, but fetch/XHR resolves fine. */
    if (!window.MedKonectDesignSystem_4460c8) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '../../_ds_bundle.js', false);
      xhr.send();
      if (xhr.status === 200) eval(xhr.responseText);
    }
  </script>
  <script type="text/babel">
    const { Button, IconButton } = window.MedKonectDesignSystem_4460c8;
    function Demo() {
      return (
        <>
          <div className="grp">
            <p className="lab">Variants</p>
            <div className="row">
              <Button icon="add">New Consultation</Button>
              <Button variant="ink" icon="videocam">Join Call</Button>
              <Button variant="tonal" icon="filter_list">Filters</Button>
              <Button variant="outline">Export PDF</Button>
              <Button variant="ghost" iconTrailing="chevron_right">View all</Button>
              <Button variant="danger" icon="emergency">Emergency</Button>
            </div>
          </div>
          <div className="grp">
            <p className="lab">Sizes &amp; states</p>
            <div className="row">
              <Button size="sm">Small</Button>
              <Button size="md">Medium</Button>
              <Button size="lg">Large</Button>
              <Button disabled>Disabled</Button>
            </div>
          </div>
          <div className="grp">
            <p className="lab">Icon buttons</p>
            <div className="row">
              <IconButton icon="notifications" label="Notifications" />
              <IconButton icon="settings" label="Settings" />
              <IconButton icon="add" variant="solid" filled label="Add" />
              <IconButton icon="more_vert" variant="solid" label="More" />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
