<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--surface-card); font-family: var(--font-sans); }
  .spec { display:flex; align-items:baseline; gap:16px; padding:12px 0; border-bottom:1px solid var(--border-subtle); }
  .spec:last-child { border-bottom:0; }
  .demo { color: var(--text-strong); flex:1; }
  .tag { font: var(--fw-medium) 11px/16px var(--font-sans); color: var(--text-muted); white-space:nowrap; text-align:right; min-width:150px; }
</style>
</head>
<body>
  <div class="spec">
    <div class="demo mk-display-lg">Better care, connected</div>
    <div class="tag">Display LG · 48/56 · 700 · −2%</div>
  </div>
  <div class="spec">
    <div class="demo mk-display-mobile">Better care</div>
    <div class="tag">Display Mobile · 36/44 · 700</div>
  </div>
  <div class="spec">
    <div class="demo mk-headline-lg">Virtual Consultation Center</div>
    <div class="tag">Headline LG · 32/40 · 600</div>
  </div>
  <div class="spec">
    <div class="demo mk-headline-md">Waiting Queue</div>
    <div class="tag">Headline MD · 24/32 · 600</div>
  </div>
</body>
</html>
