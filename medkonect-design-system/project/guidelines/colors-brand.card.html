<!-- @dsCard group="Colors" viewport="700x230" name="Brand palette" subtitle="MedKonect Blue + Clinical Teal ramps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-app); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; margin-bottom: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-xs); border: 1px solid var(--border-subtle); }
  .chip { height: 56px; }
  .meta { padding: 6px 8px 8px; background: var(--surface-card); }
  .name { font: var(--fw-semibold) 12px/16px var(--font-sans); color: var(--text-body); }
  .hex { font: var(--fw-regular) 11px/14px var(--font-sans); color: var(--text-muted); text-transform: uppercase; }
  .label { font: var(--fw-bold) 11px/1 var(--font-sans); letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 10px; }
</style>
</head>
<body>
  <p class="label">MedKonect Blue · brand ink &amp; primary</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#001b35"></div><div class="meta"><div class="name">blue-900</div><div class="hex">#001b35</div></div></div>
    <div class="sw"><div class="chip" style="background:#003057"></div><div class="meta"><div class="name">blue-700 ★</div><div class="hex">#003057</div></div></div>
    <div class="sw"><div class="chip" style="background:#234871"></div><div class="meta"><div class="name">blue-600</div><div class="hex">#234871</div></div></div>
    <div class="sw"><div class="chip" style="background:#7699c5"></div><div class="meta"><div class="name">blue-300</div><div class="hex">#7699c5</div></div></div>
    <div class="sw"><div class="chip" style="background:#a6c9f8"></div><div class="meta"><div class="name">blue-200</div><div class="hex">#a6c9f8</div></div></div>
    <div class="sw"><div class="chip" style="background:#d2e4ff"></div><div class="meta"><div class="name">blue-100</div><div class="hex">#d2e4ff</div></div></div>
  </div>
  <p class="label">Clinical Teal · interactive accent</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#004f4f"></div><div class="meta"><div class="name">teal-700</div><div class="hex">#004f4f</div></div></div>
    <div class="sw"><div class="chip" style="background:#006a6a"></div><div class="meta"><div class="name">teal-600</div><div class="hex">#006a6a</div></div></div>
    <div class="sw"><div class="chip" style="background:#008B8B"></div><div class="meta"><div class="name">teal-500 ★</div><div class="hex">#008B8B</div></div></div>
    <div class="sw"><div class="chip" style="background:#6fd7d6"></div><div class="meta"><div class="name">teal-300</div><div class="hex">#6fd7d6</div></div></div>
    <div class="sw"><div class="chip" style="background:#8cf3f3"></div><div class="meta"><div class="name">teal-200</div><div class="hex">#8cf3f3</div></div></div>
  </div>
</body>
</html>
